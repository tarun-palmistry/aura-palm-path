<!doctype html>

  <head>
    <script>
      (function () {
        try {
          var k = "astrapalm-theme";
          var t = localStorage.getItem(k);
          var d = document.documentElement;
          var darkMq = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (t === "light") d.classList.remove("dark");
          else if (t === "dark") d.classList.add("dark");
          else {
            if (darkMq) d.classList.add("dark");
            else d.classList.remove("dark");
          }
        } catch (e) {}
      })();
    </script>
